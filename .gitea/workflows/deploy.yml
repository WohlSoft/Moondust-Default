name: Deployment of the package
on:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack-and-upload:
    runs-on: debian-12-deb-build
    steps:
      - name: Clone repository
        run: git clone ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY} -b ${GITHUB_REF_NAME} --depth 1 Moondust-Default

      - name: Pack an archive
        run: |
            mkdir output
            7z a -tzip -mx=9 -mmt2 output/Moondust-Default.zip "Moondust-Default" -x!Moondust-Default/.git -x!Moondust-Default/.gitea -x!Moondust-Default/.gitignore -x!Moondust-Default/.gitattributes

      - name: List built files
        run: |
            echo "Out"
            ls -la output

      - name: Uploading results...
        run: |
            UPLOAD_LIST="" # set ssl:verify-certificate no;

            for q in ./output/*; do
                echo "$q will be uploaded..."
                UPLOAD_LIST="${UPLOAD_LIST} put -O config_packs/ $q;"
            done

            echo "Uploading..."
            lftp -e "${UPLOAD_LIST} exit" -u ${{ secrets.builds_login }},${{ secrets.builds_password }} ${{ secrets.builds_host }}
            echo "Done!"
